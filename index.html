<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Fántaci | Aventura Épica del Valle</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #020b14 0%, #081d2c 50%, #030811 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 16px;
            margin: 0;
            overflow: hidden;
        }

        .game-container {
            position: relative;
            border-radius: 32px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), 
                        0 0 40px rgba(255, 216, 155, 0.15),
                        inset 0 1px 3px rgba(255,255,255,0.1);
            background: #030a12;
            display: inline-block;
            padding: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.7);
        }

        .overlay-screen {
            position: absolute;
            top: 8px;
            left: 8px;
            right: 8px;
            bottom: 8px;
            border-radius: 24px;
            background: rgba(3, 10, 18, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            z-index: 20;
            padding: 20px;
            transition: opacity 0.3s ease;
        }

        .hidden {
            display: none !important;
            opacity: 0;
            pointer-events: none;
        }

        h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #ffd89b, #c7e9fb);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 15px rgba(255, 216, 155, 0.6);
            margin-bottom: 20px;
            text-align: center;
            letter-spacing: 2px;
        }

        h2 {
            font-size: 1.3rem;
            color: #ffd89b;
            margin-bottom: 15px;
        }

        .menu-btn {
            background: rgba(4, 25, 44, 0.8);
            border: 1px solid rgba(255, 216, 155, 0.4);
            color: #ffefc0;
            padding: 12px 28px;
            margin: 8px 0;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 1px;
            cursor: pointer;
            width: 80%;
            max-width: 250px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            transition: all 0.2s ease;
        }

        .menu-btn:hover, .menu-btn:active {
            background: #ffd89b;
            color: #030a12;
            box-shadow: 0 0 15px #ffd89b;
            transform: scale(1.03);
        }

        .menu-btn.danger {
            border-color: rgba(255, 42, 109, 0.5);
            color: #ff2a6d;
        }
        .menu-btn.danger:hover, .menu-btn.danger:active {
            background: #ff2a6d;
            color: #ffffff;
            box-shadow: 0 0 15px #ff2a6d;
        }

        .custom-section {
            width: 80%;
            max-width: 260px;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.75rem;
            color: #ffefc0;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input[type="text"] {
            background: rgba(2, 8, 16, 0.8);
            border: 1px solid rgba(255, 216, 155, 0.3);
            padding: 10px 15px;
            border-radius: 12px;
            color: white;
            font-size: 0.9rem;
            outline: none;
            text-align: center;
        }
        input[type="text"]:focus {
            border-color: #ffd89b;
            box-shadow: 0 0 10px rgba(255, 216, 155, 0.3);
        }

        .color-pickers {
            display: flex;
            justify-content: space-around;
            margin-top: 5px;
        }

        .color-dot {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.1s;
        }
        .color-dot.selected {
            border-color: #ffffff;
            box-shadow: 0 0 10px rgba(255,255,255,0.8);
            transform: scale(1.15);
        }

        .ranks-list {
            width: 90%;
            max-height: 400px;
            overflow-y: auto;
            background: rgba(2, 8, 16, 0.6);
            padding: 15px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 15px;
            font-size: 0.85rem;
        }

        .rank-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .rank-item:last-child { border: none; }
        .rank-active { 
            background: linear-gradient(90deg, rgba(255,216,155,0.2), transparent);
            color: #ffd89b; 
            font-weight: bold;
            padding-left: 8px;
            border-radius: 8px;
        }
        .rank-medal { font-size: 1.2rem; margin-right: 8px; }
        .rank-name { flex: 1; }
        .rank-score { color: #a3d7e8; font-size: 0.75rem; }

        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
        }

        /* NOTIFICACIÓN REPOSICIONADA - ARRIBA CENTRAL */
        .rank-up-notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #1a0f0a, #0a0508);
            border: 2px solid #ffd89b;
            border-radius: 20px;
            padding: 12px 30px;
            text-align: center;
            z-index: 100;
            animation: slideDownFade 2.5s ease forwards;
            pointer-events: none;
            box-shadow: 0 0 40px rgba(255, 216, 155, 0.5);
            white-space: nowrap;
        }

        @keyframes slideDownFade {
            0% { opacity: 0; transform: translateX(-50%) translateY(-30px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0px); }
            30% { opacity: 1; transform: translateX(-50%) translateY(0px); }
            85% { opacity: 1; transform: translateX(-50%) translateY(0px); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); visibility: hidden; }
        }

        .rank-up-medal { font-size: 2rem; display: inline-block; margin-right: 10px; vertical-align: middle; }
        .rank-up-name { font-size: 1.2rem; color: #ffd89b; display: inline-block; vertical-align: middle; }
        .rank-up-reward { font-size: 0.7rem; color: #00ffd2; margin-top: 4px; text-align: center; }

        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #ffd89b;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="game-container">
    <canvas id="gameCanvas" width="400" height="600"></canvas>

    <div id="screen-main-menu" class="overlay-screen">
        <h1>✨ FÁNTACI ✨</h1>
        <p style="color:#ffefc0; margin-bottom:20px; text-align:center;">El Valle de los Dinos Místicos</p>
        
        <div class="custom-section">
            <label>Guardián del Valle</label>
            <input type="text" id="player-name-input" value="Guardián" maxlength="16">
        </div>

        <div class="custom-section">
            <label>Esencia del Alma</label>
            <div class="color-pickers">
                <div class="color-dot selected" data-color="#ffaa44" style="background: #ffaa44;"></div>
                <div class="color-dot" data-color="#44ffaa" style="background: #44ffaa;"></div>
                <div class="color-dot" data-color="#ff44aa" style="background: #ff44aa;"></div>
                <div class="color-dot" data-color="#aa44ff" style="background: #aa44ff;"></div>
                <div class="color-dot" data-color="#44aaff" style="background: #44aaff;"></div>
            </div>
        </div>

        <button class="menu-btn" id="btn-play">🌄 INICIAR AVENTURA</button>
        <button class="menu-btn" id="btn-ranks">📜 TABLA DE RANGOS</button>
        <button class="menu-btn" id="btn-settings">⚙️ AJUSTES</button>
        
        <p style="font-size:0.7rem; margin-top:15px; color:#62829c;">¡Asciende y conviértete en leyenda!</p>
    </div>

    <div id="screen-ranks" class="overlay-screen hidden">
        <h2>🏆 JERARQUÍA DEL VALLE</h2>
        <div class="ranks-list" id="ranks-list-container">
            <!-- Se llena dinámicamente -->
        </div>
        <p style="font-size:0.75rem; color:#ffefc0; margin-bottom:15px;" id="current-rank-status">Tu rango actual: --</p>
        <button class="menu-btn" id="btn-ranks-back">🔙 REGRESAR</button>
    </div>

    <div id="screen-settings" class="overlay-screen hidden">
        <h2>⚙️ AJUSTES</h2>
        <div class="settings-panel" style="width:90%; background: rgba(2, 8, 16, 0.6); padding:15px; border-radius:16px;">
            <div class="setting-row">
                <span>✨ Vibración Háptica</span>
                <input type="checkbox" id="setting-vibrate" checked style="width:18px; height:18px; cursor:pointer;">
            </div>
            <div class="setting-row">
                <span>💾 Guardar Progreso</span>
                <input type="checkbox" id="setting-save" checked style="width:18px; height:18px; cursor:pointer;">
            </div>
        </div>
        <button class="menu-btn" id="btn-settings-back">🔙 REGRESAR</button>
    </div>

    <div id="screen-game-over" class="overlay-screen hidden">
        <h1 style="color:#ffaa44;">⚰️ FIN DEL VIAJE</h1>
        
        <p id="game-over-stats" style="text-align:center; line-height: 1.6; margin-bottom:20px; color:#ffefc0;">
            🎯 Puntaje: <span id="go-score" style="color:#ffd89b; font-weight:bold;">0</span><br>
            🏅 Rango Alcanzado: <span id="go-rank" style="color:#ffaa44;">POLLUELO</span><br>
            🌟 Mejor Récord: <span id="go-best" style="color:#ffaa44;">0</span>
        </p>

        <button class="menu-btn" id="btn-go-continue">🔄 VOLVER A VOLAR</button>
        <button class="menu-btn danger" id="btn-go-menu">🏠 REGRESAR AL VALLE</button>
    </div>
</div>

<script>
    (function(){
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        
        // ==================== RANGOS Y PROGRESIÓN ====================
        const RANKS = [
            { medal: "🥚", name: "POLLUELO", minScore: 0, speed: 2.0, gap: 170 },
            { medal: "🥉", name: "NOVATO", minScore: 10, speed: 2.2, gap: 165 },
            { medal: "🥈", name: "APRENDIZ", minScore: 25, speed: 2.4, gap: 160 },
            { medal: "🥇", name: "EXPERTO", minScore: 50, speed: 2.7, gap: 158 },
            { medal: "💎", name: "MAESTRO", minScore: 100, speed: 3.0, gap: 155 },
            { medal: "🔷", name: "ÉLITE", minScore: 150, speed: 3.3, gap: 152 },
            { medal: "👑", name: "LEGENDARIO", minScore: 250, speed: 3.6, gap: 150 },
            { medal: "🔥", name: "MÍTICO", minScore: 400, speed: 3.9, gap: 148 },
            { medal: "🌟", name: "INMORTAL", minScore: 600, speed: 4.2, gap: 145 },
            { medal: "⚡", name: "CELESTIAL", minScore: 850, speed: 4.5, gap: 142 },
            { medal: "🌌", name: "CÓSMICO", minScore: 1200, speed: 4.8, gap: 140 },
            { medal: "🐉", name: "DRAGÓN ANCESTRAL", minScore: 1700, speed: 5.1, gap: 138 },
            { medal: "✨", name: "TITÁN DEL VALLE", minScore: 2300, speed: 5.4, gap: 136 },
            { medal: "🏆", name: "GUARDIÁN DE FÁNTACI", minScore: 3000, speed: 5.8, gap: 134 }
        ];

        // Variables dinámicas de dificultad
        let currentGameSpeed = RANKS[0].speed;
        let currentGameGap = RANKS[0].gap;
        
        // Datos del jugador
        let playerName = "Guardián";
        let birdColor = "#ffaa44";
        let useVibration = true;
        let useSave = true;
        let totalRelics = 0;
        let unlockedCharacters = [];
        let bestScore = 0;
        
        // Rangos alcanzados (para recompensas únicas)
        let ranksAchieved = [];
        
        // ==================== CONSTANTES DEL JUEGO ====================
        const BIRD_RADIUS = 15;
        let birdX = 85; 
        let birdY = 300;
        let velocity = 0;
        const GRAVITY = 0.215;
        const JUMP_FORCE = -4.9;
        
        let pipes = [];
        const PIPE_WIDTH = 68;
        let frameCounter = 0;
        let pipeSpawnCounter = 0;
        const BASE_PIPE_SPAWN_GAP = 115;
        
        let score = 0;
        let previousRank = null;
        let gameState = 'menu'; 
        
        // ==================== PARTÍCULAS Y AMBIENTE ====================
        let particles = [];
        let ambientParticles = [];
        let backgroundDinos = [];
        
        class Particle {
            constructor(x, y, vx, vy, type = 'feather') {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.type = type;
                this.life = type === 'feather' ? 25 : 40;
                this.maxLife = this.life;
                this.size = Math.random() * 4 + (type === 'feather' ? 2 : 1);
                this.color = type === 'feather' ? birdColor : (type === 'crystal' ? '#ffd89b' : (Math.random() > 0.4 ? '#a6ebff' : '#ffe6f9'));
                this.angle = Math.random() * Math.PI * 2;
                this.rotSpeed = (Math.random() - 0.5) * 0.1;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if(this.type === 'feather') {
                    this.vy += 0.08;
                } else {
                    this.x += Math.sin(frameCounter * 0.02 + this.size) * 0.1;
                }
                this.angle += this.rotSpeed;
                this.life--;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = Math.max(0, this.life / this.maxLife);
                ctx.shadowBlur = this.type === 'feather' ? 10 : 6;
                ctx.shadowColor = this.color;
                
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                ctx.fillStyle = this.color;
                
                if(this.type === 'feather') {
                    ctx.beginPath();
                    ctx.ellipse(0, 0, this.size * 1.8, this.size * 0.6, 0, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    ctx.beginPath();
                    ctx.moveTo(0, -this.size);
                    ctx.lineTo(this.size * 0.6, 0);
                    ctx.lineTo(0, this.size);
                    ctx.lineTo(-this.size * 0.6, 0);
                    ctx.closePath();
                    ctx.fill();
                }
                ctx.restore();
            }
        }
        
        // ==================== SISTEMA DE RANGOS Y RECOMPENSAS ====================
        function getCurrentRank(scoreValue) {
            let current = RANKS[0];
            for (let r of RANKS) {
                if (scoreValue >= r.minScore) current = r;
            }
            return current;
        }
        
        function updateDifficultyByRank(rank) {
            currentGameSpeed = rank.speed;
            currentGameGap = rank.gap;
        }
        
        function onRankUp(rank) {
            let rewardMsg = "";
            
            switch(rank.name) {
                case "MAESTRO":
                    totalRelics += 25;
                    rewardMsg = "🏺 +25 Reliquias del Valle";
                    break;
                case "LEGENDARIO":
                    if(!unlockedCharacters.includes("dragón")) {
                        unlockedCharacters.push("dragón");
                        rewardMsg = "🐉 Desbloqueaste: Espíritu Dragón";
                    }
                    break;
                case "INMORTAL":
                    totalRelics += 100;
                    rewardMsg = "💎 +100 Reliquias Ancestrales";
                    break;
                case "GUARDIÁN DE FÁNTACI":
                    if(!unlockedCharacters.includes("fénix")) {
                        unlockedCharacters.push("fénix");
                        rewardMsg = "🔥 Desbloqueaste: Fénix Eterno";
                    }
                    if(!unlockedCharacters.includes("murciélago")) {
                        unlockedCharacters.push("murciélago");
                        rewardMsg += " 🦇 + Espíritu Murciélago";
                    }
                    break;
                case "CELESTIAL":
                    totalRelics += 50;
                    rewardMsg = "⚡ +50 Esencia Celestial";
                    break;
                case "CÓSMICO":
                    totalRelics += 75;
                    rewardMsg = "🌌 +75 Fragmentos Cósmicos";
                    break;
                default:
                    totalRelics += 10;
                    rewardMsg = "🔮 +10 Fragmentos de Poder";
                    break;
            }
            
            if(!ranksAchieved.includes(rank.name)) {
                ranksAchieved.push(rank.name);
            }
            
            // Mostrar notificación en la PARTE SUPERIOR
            showRankUpNotification(rank, rewardMsg);
            
            // Efecto de partículas
            addCrystalExplosion(canvas.width / 2, canvas.height / 2);
            
            if(useVibration && navigator.vibrate) navigator.vibrate([50, 100, 50]);
        }
        
        function addCrystalExplosion(x, y) {
            for(let i = 0; i < 40; i++) {
                particles.push(new Particle(x + (Math.random() - 0.5) * 100, y + (Math.random() - 0.5) * 80, 
                    (Math.random() - 0.5) * 6, (Math.random() - 0.5) * 6 - 2, 'crystal'));
            }
        }
        
        function showRankUpNotification(rank, reward) {
            const notification = document.createElement('div');
            notification.className = 'rank-up-notification';
            notification.innerHTML = `
                <div style="display:flex; align-items:center; gap:12px;">
                    <span class="rank-up-medal">${rank.medal}</span>
                    <div>
                        <div class="rank-up-name">✨ ${rank.name} ✨</div>
                        <div class="rank-up-reward">${reward}</div>
                    </div>
                </div>
            `;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 2500);
        }
        
        function checkAndApplyRankUp() {
            const currentRank = getCurrentRank(score);
            
            if(previousRank === null) {
                previousRank = currentRank;
                updateDifficultyByRank(currentRank);
                return;
            }
            
            if(currentRank.name !== previousRank.name) {
                onRankUp(currentRank);
                updateDifficultyByRank(currentRank);
                previousRank = currentRank;
                saveGameData();
            }
        }
        
        // ==================== GUARDADO LOCAL ====================
        function saveGameData() {
            if(!useSave) return;
            const saveData = {
                bestScore: bestScore,
                totalRelics: totalRelics,
                unlockedCharacters: unlockedCharacters,
                ranksAchieved: ranksAchieved,
                playerName: playerName,
                birdColor: birdColor
            };
            localStorage.setItem("fantaci_save", JSON.stringify(saveData));
        }
        
        function loadGameData() {
            const saved = localStorage.getItem("fantaci_save");
            if(saved) {
                try {
                    const data = JSON.parse(saved);
                    bestScore = data.bestScore || 0;
                    totalRelics = data.totalRelics || 0;
                    unlockedCharacters = data.unlockedCharacters || [];
                    ranksAchieved = data.ranksAchieved || [];
                    playerName = data.playerName || "Guardián";
                    birdColor = data.birdColor || "#ffaa44";
                    
                    if(inputName) inputName.value = playerName;
                    
                    const dots = document.querySelectorAll(".color-dot");
                    dots.forEach(dot => {
                        if(dot.getAttribute("data-color") === birdColor) {
                            dots.forEach(d => d.classList.remove("selected"));
                            dot.classList.add("selected");
                        }
                    });
                } catch(e) { console.warn("Error cargando datos"); }
            }
        }
        
        // ==================== INICIALIZACIÓN DEL JUEGO ====================
        function initAmbientParticles() {
            ambientParticles = [];
            for(let i = 0; i < 25; i++) {
                ambientParticles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * (canvas.height - 100),
                    size: Math.random() * 2 + 1,
                    speedY: -(Math.random() * 0.3 + 0.1),
                    speedX: (Math.random() - 0.5) * 0.2,
                    pulse: Math.random() * Math.PI
                });
            }
        }

        function initBackgroundDinos() {
            backgroundDinos = [];
            for(let i = 0; i < 4; i++) {
                backgroundDinos.push({
                    x: Math.random() * canvas.width,
                    y: 60 + Math.random() * 140,
                    size: Math.random() * 18 + 8,
                    speed: 0.3 + Math.random() * 0.5,
                    seed: Math.random() * 100
                });
            }
        }
        
        function addFlapParticles() {
            let count = 8 + Math.floor(Math.random() * 6);
            for(let i = 0; i < count; i++) {
                let speedX = -2.5 - Math.random() * 1.5;
                let speedY = (Math.random() - 0.5) * 3;
                particles.push(new Particle(birdX - 10, birdY, speedX, speedY, 'feather'));
            }
            for(let i = 0; i < 4; i++) {
                particles.push(new Particle(birdX, birdY, (Math.random()-0.5)*4, (Math.random()-0.5)*4, 'sparkle'));
            }
        }
        
        function fullReset() {
            birdY = 260;
            velocity = 0;
            pipes = [];
            score = 0;
            frameCounter = 0;
            pipeSpawnCounter = 0;
            particles = [];
            previousRank = null;
            
            const startingRank = getCurrentRank(0);
            currentGameSpeed = startingRank.speed;
            currentGameGap = startingRank.gap;
            
            initAmbientParticles();
            initBackgroundDinos();
        }
        
        function startNewGame() {
            playerName = inputName.value.trim() || "Guardián";
            useVibration = checkVibrate.checked;
            const saveSetting = document.getElementById("setting-save");
            if(saveSetting) useSave = saveSetting.checked;
            
            fullReset();
            gameState = 'playing';
            
            scrMenu.classList.add("hidden");
            scrGameOver.classList.add("hidden");
        }
        
        function handleFlap() {
            if(gameState === 'playing'){
                velocity = JUMP_FORCE;
                addFlapParticles();
                if(useVibration && navigator.vibrate) navigator.vibrate(15);
            } else if (gameState === 'menu') {
                startNewGame();
            } else if (gameState === 'gameover') {
                startNewGame();
            }
        }
        
        function checkCollisions() {
            const groundLimit = canvas.height - 45;
            if(birdY + BIRD_RADIUS >= groundLimit || birdY - BIRD_RADIUS <= 0) {
                triggerGameOver();
                return true;
            }
            
            for(let pipe of pipes){
                let closestXTop = Math.max(pipe.x, Math.min(birdX, pipe.x + PIPE_WIDTH));
                let closestYTop = Math.max(0, Math.min(birdY, pipe.topHeight));
                let dxTop = birdX - closestXTop;
                let dyTop = birdY - closestYTop;
                
                let bottomYStart = canvas.height - pipe.bottomHeight - 45;
                let closestXBot = Math.max(pipe.x, Math.min(birdX, pipe.x + PIPE_WIDTH));
                let closestYBot = Math.max(bottomYStart, Math.min(birdY, canvas.height - 45));
                let dxBot = birdX - closestXBot;
                let dyBot = birdY - closestYBot;
                
                if((dxTop*dxTop + dyTop*dyTop) < (BIRD_RADIUS * BIRD_RADIUS) || 
                   (dxBot*dxBot + dyBot*dyBot) < (BIRD_RADIUS * BIRD_RADIUS)) {
                    triggerGameOver();
                    return true;
                }
            }
            return false;
        }

        function triggerGameOver() {
            gameState = 'gameover';
            
            if(score > bestScore) {
                bestScore = score;
                saveGameData();
            }
            
            for(let i=0; i<25; i++) {
                particles.push(new Particle(birdX, birdY, (Math.random()-0.5)*7, (Math.random()-0.5)*7, 'sparkle'));
            }

            const rank = getCurrentRank(score);
            document.getElementById("go-score").innerText = score;
            document.getElementById("go-rank").innerHTML = `${rank.medal} ${rank.name}`;
            document.getElementById("go-best").innerHTML = `${bestScore} (${getCurrentRank(bestScore).name})`;

            scrGameOver.classList.remove("hidden");
            saveGameData();
        }
        
        function updateGame() {
            frameCounter++;
            pipeSpawnCounter++;

            backgroundDinos.forEach(dino => {
                dino.x -= dino.speed;
                if(dino.x + dino.size * 2 < 0) {
                    dino.x = canvas.width + dino.size;
                    dino.y = 40 + Math.random() * 140;
                }
            });

            if(gameState !== 'playing') return;
            
            velocity += GRAVITY;
            birdY += velocity;
            
            let dynamicSpawnGap = Math.max(80, BASE_PIPE_SPAWN_GAP - Math.floor(score / 200));
            if(pipeSpawnCounter >= dynamicSpawnGap) {
                pipeSpawnCounter = 0;
                
                let minTop = 60;
                let maxTop = canvas.height - currentGameGap - 45 - 80;
                let topHeight = Math.floor(Math.random() * (maxTop - minTop + 1) + minTop);
                let bottomHeight = canvas.height - topHeight - currentGameGap - 45;
                
                pipes.push({
                    x: canvas.width,
                    topHeight: topHeight,
                    bottomHeight: bottomHeight,
                    counted: false,
                    seed: Math.random() * 100
                });
            }
            
            for(let pipe of pipes){
                pipe.x -= currentGameSpeed;
                if(!pipe.counted && pipe.x + PIPE_WIDTH < birdX){
                    score++;
                    pipe.counted = true;
                    checkAndApplyRankUp();
                    
                    for(let k=0; k<4; k++) {
                        particles.push(new Particle(pipe.x + PIPE_WIDTH/2, canvas.height/2, (Math.random()-0.5)*2, (Math.random()-0.5)*4, 'sparkle'));
                    }
                }
            }
            pipes = pipes.filter(pipe => pipe.x + PIPE_WIDTH > 0);
            
            particles.forEach(p => p.update());
            particles = particles.filter(p => p.life > 0);
            if(particles.length > 250) particles = particles.slice(0, 200);

            checkCollisions();
        }
        
        // ==================== RENDER ====================
        function drawBackground() {
            const skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            skyGrad.addColorStop(0, "#0a0a1a");
            skyGrad.addColorStop(0.4, "#1a1a3a");
            skyGrad.addColorStop(0.8, "#2a1a2a");
            skyGrad.addColorStop(1, "#1a0f0a");
            ctx.fillStyle = skyGrad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.save();
            ctx.shadowBlur = 30;
            ctx.shadowColor = "#ffd89b";
            ctx.beginPath();
            ctx.arc(canvas.width - 60, 70, 25, 0, Math.PI * 2);
            ctx.fillStyle = "#ffefc0";
            ctx.fill();
            ctx.restore();
            
            backgroundDinos.forEach(dino => {
                let wingSwing = Math.sin(frameCounter * 0.08 + dino.seed) * (dino.size * 0.3);
                ctx.save();
                ctx.globalAlpha = 0.3;
                ctx.fillStyle = "#ffd89b";
                ctx.beginPath();
                ctx.moveTo(dino.x, dino.y); 
                ctx.lineTo(dino.x + dino.size * 0.5, dino.y - wingSwing); 
                ctx.lineTo(dino.x + dino.size * 0.3, dino.y + dino.size * 0.1);
                ctx.lineTo(dino.x + dino.size, dino.y + dino.size * 0.2); 
                ctx.lineTo(dino.x + dino.size * 0.2, dino.y + dino.size * 0.3);
                ctx.lineTo(dino.x + dino.size * 0.5, dino.y + dino.size * 0.6 + wingSwing); 
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            });
            
            ambientParticles.forEach(p => {
                p.pulse += 0.02;
                if(gameState === 'playing') {
                    p.y += p.speedY;
                    p.x += p.speedX;
                    if(p.y < 0) p.y = canvas.height - 45;
                    if(p.x < 0 || p.x > canvas.width) p.x = Math.random() * canvas.width;
                }
                ctx.save();
                ctx.globalAlpha = 0.3 + Math.sin(p.pulse) * 0.4;
                ctx.fillStyle = "#ffd89b";
                ctx.shadowBlur = 4;
                ctx.shadowColor = "#ffaa44";
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                ctx.fill();
                ctx.restore();
            });
        }
        
        function drawCrystalPillar(x, y, width, height, isTop) {
            ctx.save();
            
            const crystalGrad = ctx.createLinearGradient(x, 0, x + width, 0);
            crystalGrad.addColorStop(0, "#2a1a0a");
            crystalGrad.addColorStop(0.3, "#8a5a2a");
            crystalGrad.addColorStop(0.5, "#ffaa44");
            crystalGrad.addColorStop(0.7, "#aa6a2a");
            crystalGrad.addColorStop(1, "#2a1a0a");
            
            ctx.fillStyle = crystalGrad;
            ctx.strokeStyle = "rgba(255, 200, 100, 0.6)";
            ctx.lineWidth = 1.5;
            ctx.shadowBlur = 10;
            ctx.shadowColor = "rgba(255, 170, 68, 0.4)";
            
            ctx.beginPath();
            if(isTop) {
                ctx.moveTo(x, 0);
                ctx.lineTo(x + width, 0);
                ctx.lineTo(x + width, height - 25);
                ctx.lineTo(x + width/2, height); 
                ctx.lineTo(x, height - 25);
            } else {
                let startY = canvas.height - height - 45;
                ctx.moveTo(x, canvas.height - 45);
                ctx.lineTo(x, startY + 25);
                ctx.lineTo(x + width/2, startY); 
                ctx.lineTo(x + width, startY + 25);
                ctx.lineTo(x + width, canvas.height - 45);
            }
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
            
            ctx.restore();
        }
        
        function drawPipes() {
            if(gameState !== 'playing' && gameState !== 'gameover') return;
            for(let pipe of pipes){
                drawCrystalPillar(pipe.x, 0, PIPE_WIDTH, pipe.topHeight, true);
                drawCrystalPillar(pipe.x, pipe.bottomHeight, PIPE_WIDTH, pipe.bottomHeight, false);
            }
        }
        
        function drawGround() {
            const groundLimit = canvas.height - 45;
            
            const groundGrad = ctx.createLinearGradient(0, groundLimit, 0, canvas.height);
            groundGrad.addColorStop(0, "#2a1a0a");
            groundGrad.addColorStop(1, "#0a0502");
            ctx.fillStyle = groundGrad;
            ctx.fillRect(0, groundLimit, canvas.width, 45);
            
            ctx.fillStyle = "rgba(255, 170, 68, 0.6)";
            ctx.fillRect(0, groundLimit, canvas.width, 2);
            
            for(let i = 0; i < 8; i++) {
                ctx.fillStyle = "rgba(255, 200, 100, 0.3)";
                ctx.beginPath();
                ctx.moveTo(20 + i * 50, groundLimit);
                ctx.lineTo(30 + i * 50, groundLimit - 8);
                ctx.lineTo(40 + i * 50, groundLimit);
                ctx.fill();
            }
        }
        
        function drawBird() {
            if(gameState !== 'playing' && gameState !== 'gameover') return;

            ctx.save();
            ctx.translate(birdX, birdY);
            
            let angle = Math.min(Math.max(velocity * 0.08, -0.4), 0.7);
            ctx.rotate(angle);
            
            ctx.shadowColor = birdColor;
            ctx.shadowBlur = 18;
            
            const bodyGrad = ctx.createRadialGradient(-2, -3, 2, 0, 0, BIRD_RADIUS);
            bodyGrad.addColorStop(0, "#ffefc0");
            bodyGrad.addColorStop(0.4, birdColor);
            bodyGrad.addColorStop(1, "#5a2a0a");
            
            ctx.beginPath();
            ctx.arc(0, 0, BIRD_RADIUS, 0, Math.PI * 2);
            ctx.fillStyle = bodyGrad;
            ctx.fill();
            
            ctx.fillStyle = birdColor;
            ctx.beginPath();
            ctx.moveTo(-BIRD_RADIUS + 2, -3);
            ctx.lineTo(-BIRD_RADIUS - 10, -8);
            ctx.lineTo(-BIRD_RADIUS - 6, 2);
            ctx.lineTo(-BIRD_RADIUS - 12, 6);
            ctx.lineTo(-BIRD_RADIUS + 2, 4);
            ctx.closePath();
            ctx.fill();

            ctx.save();
            let wingOsc = Math.sin(frameCounter * 0.4) * 4;
            ctx.translate(-4, 2);
            ctx.rotate(wingOsc * 0.08);
            
            const wingGrad = ctx.createLinearGradient(-8, -4, 8, 4);
            wingGrad.addColorStop(0, "#ffefc0");
            wingGrad.addColorStop(0.5, birdColor);
            wingGrad.addColorStop(1, "#8a4a1a");
            
            ctx.beginPath();
            ctx.ellipse(-2, 0, 11, 7, -0.3, 0, Math.PI * 2);
            ctx.fillStyle = wingGrad;
            ctx.fill();
            ctx.restore();
            
            ctx.beginPath();
            ctx.arc(6, -5, 5.5, 0, Math.PI * 2);
            ctx.fillStyle = "#ffffff";
            ctx.fill();
            
            ctx.beginPath();
            ctx.arc(7.5, -5, 2.8, 0, Math.PI * 2);
            ctx.fillStyle = "#021124";
            ctx.fill();
            
            ctx.beginPath();
            ctx.arc(8.8, -6.2, 1, 0, Math.PI * 2);
            ctx.fillStyle = "#ffffff";
            ctx.fill();
            
            ctx.fillStyle = "#ffaa44";
            ctx.beginPath();
            ctx.moveTo(13, -2);
            ctx.lineTo(24, 1);
            ctx.lineTo(12, 5);
            ctx.closePath();
            ctx.fill();

            ctx.restore();
        }

        function drawScore() {
            if(gameState !== 'playing') return;
            ctx.save();
            ctx.fillStyle = "rgba(2, 8, 16, 0.6)";
            ctx.fillRect(10, 10, 140, 45);
            
            ctx.font = "bold 14px 'Segoe UI', sans-serif";
            ctx.fillStyle = "#ffd89b";
            ctx.fillText(`🎯 ${score} pts`, 18, 30);
            
            const currentRank = getCurrentRank(score);
            ctx.font = "12px 'Segoe UI'";
            ctx.fillStyle = "#ffaa44";
            ctx.fillText(`${currentRank.medal} ${currentRank.name}`, 18, 48);
            ctx.restore();
        }
        
        function updateRankList() {
            const container = document.getElementById("ranks-list-container");
            if(!container) return;
            
            container.innerHTML = "";
            RANKS.forEach(rank => {
                const div = document.createElement("div");
                div.className = "rank-item";
                if(bestScore >= rank.minScore) div.classList.add("rank-active");
                div.innerHTML = `
                    <span class="rank-medal">${rank.medal}</span>
                    <span class="rank-name">${rank.name}</span>
                    <span class="rank-score">${rank.minScore}+ pts</span>
                `;
                container.appendChild(div);
            });
            
            const currentRank = getCurrentRank(bestScore);
            document.getElementById("current-rank-status").innerHTML = `🏆 Tu rango actual: ${currentRank.medal} ${currentRank.name} (${bestScore} pts)`;
        }
        
        function drawLoop() {
            updateGame();
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBackground();
            drawPipes();
            
            particles.forEach(p => p.draw());
            
            drawGround();
            drawBird();
            drawScore();
            
            requestAnimationFrame(drawLoop);
        }

        // ==================== EVENTOS Y UI ====================
        window.addEventListener("keydown", function(e){
            if(e.code === "Space" || e.code === "ArrowUp") {
                e.preventDefault();
                handleFlap();
            }
        });

        canvas.addEventListener("touchstart", function(e){
            e.preventDefault();
            handleFlap();
        }, {passive: false});

        canvas.addEventListener("mousedown", function(e){
            handleFlap();
        });

        const scrMenu = document.getElementById("screen-main-menu");
        const scrRanks = document.getElementById("screen-ranks");
        const scrSettings = document.getElementById("screen-settings");
        const scrGameOver = document.getElementById("screen-game-over");
        const inputName = document.getElementById("player-name-input");

        document.getElementById("btn-play").addEventListener("click", startNewGame);
        
        document.getElementById("btn-ranks").addEventListener("click", () => {
            updateRankList();
            scrMenu.classList.add("hidden");
            scrRanks.classList.remove("hidden");
        });
        
        document.getElementById("btn-ranks-back").addEventListener("click", () => {
            scrRanks.classList.add("hidden");
            scrMenu.classList.remove("hidden");
        });

        document.getElementById("btn-settings").addEventListener("click", () => {
            scrMenu.classList.add("hidden");
            scrSettings.classList.remove("hidden");
        });

        document.getElementById("btn-settings-back").addEventListener("click", () => {
            scrSettings.classList.add("hidden");
            scrMenu.classList.remove("hidden");
        });

        document.getElementById("btn-go-continue").addEventListener("click", startNewGame);
        
        document.getElementById("btn-go-menu").addEventListener("click", () => {
            scrGameOver.classList.add("hidden");
            scrMenu.classList.remove("hidden");
            gameState = 'menu';
        });

        const dots = document.querySelectorAll(".color-dot");
        dots.forEach(dot => {
            dot.addEventListener("click", (e) => {
                dots.forEach(d => d.classList.remove("selected"));
                e.target.classList.add("selected");
                birdColor = e.target.getAttribute("data-color");
                saveGameData();
            });
        });
        
        const checkVibrate = document.getElementById("setting-vibrate");
        
        loadGameData();
        initAmbientParticles();
        initBackgroundDinos();
        
        drawLoop();
    })();
</script>
</body>
</html>
